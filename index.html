<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dreamscape">
<title>Dreamscape — Dream Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg1: #0a0b1a; --bg2: #10122a; --bg3: #161840;
    --text-bright: rgba(230, 225, 255, 0.85);
    --text-mid: rgba(200, 205, 230, 0.75);
    --text-dim: rgba(180, 190, 220, 0.4);
    --text-faint: rgba(160, 170, 210, 0.3);
    --accent: rgba(130, 120, 255, 0.25);
    --accent-border: rgba(150, 140, 255, 0.5);
    --blue-soft: rgba(100, 160, 255, 0.08);
    --blue-text: rgba(140, 180, 255, 0.6);
    --font-display: 'Cormorant Garamond', Georgia, serif;
    --font-body: 'Nunito', -apple-system, sans-serif;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: linear-gradient(165deg, var(--bg1) 0%, var(--bg2) 35%, var(--bg3) 60%, #0e0f24 100%);
    font-family: var(--font-body);
    color: var(--text-mid);
    position: relative;
  }

  /* Stars */
  #stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .star {
    position: absolute; border-radius: 50%; background: rgba(255,255,255,0.6);
    animation: twinkle var(--dur) var(--delay) ease-in-out infinite alternate;
  }
  @keyframes twinkle { 0% { opacity: 0.15; } 100% { opacity: 1; } }
  @keyframes fadeUp { 0% { opacity: 0; transform: translateY(14px); } 100% { opacity: 1; transform: translateY(0); } }
  @keyframes slideIn { 0% { opacity: 0; transform: translateX(16px); } 100% { opacity: 1; transform: translateX(0); } }

  #app {
    position: relative; z-index: 1;
    max-width: 480px; margin: 0 auto;
    height: 100%; display: flex; flex-direction: column;
    padding: 0 20px;
  }

  /* Header */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: calc(16px + var(--safe-top)) 0 20px;
    flex-shrink: 0;
  }
  .logo { font-family: var(--font-display); font-size: 24px; font-weight: 300; color: rgba(220,215,255,0.85); letter-spacing: 1px; text-align: center; flex: 1; }
  .back-btn {
    background: none; border: none; color: rgba(160,170,220,0.6);
    font-family: var(--font-body); font-size: 14px; cursor: pointer;
    padding: 4px 0; min-width: 60px; text-align: left;
  }
  .header-spacer { min-width: 60px; }

  /* Scrollable area */
  .scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: calc(20px + var(--safe-bottom)); }
  .scroll-area::-webkit-scrollbar { display: none; }

  /* New dream button */
  .new-btn {
    width: 100%; padding: 16px 20px;
    background: linear-gradient(135deg, rgba(100,90,255,0.15), rgba(140,100,255,0.08));
    border: 1px solid rgba(130,120,255,0.2); border-radius: 16px;
    color: rgba(200,195,255,0.85); font-family: var(--font-body);
    font-size: 15px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 24px;
  }
  .new-btn span { font-size: 20px; margin-right: 8px; }

  /* Empty state */
  .empty { text-align: center; padding: 60px 20px; }
  .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.6; }
  .empty-title { font-family: var(--font-display); font-size: 20px; color: rgba(255,255,255,0.5); font-weight: 300; font-style: italic; }
  .empty-sub { font-size: 13px; color: rgba(255,255,255,0.3); margin-top: 8px; }

  /* Cards */
  .cards { display: flex; flex-direction: column; gap: 12px; }
  .card {
    width: 100%; text-align: left; padding: 16px 18px;
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px; cursor: pointer;
    font-family: inherit; color: inherit;
    animation: slideIn 0.3s ease-out both;
  }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .card-title { font-family: var(--font-display); font-size: 18px; font-weight: 400; color: var(--text-bright); margin-bottom: 2px; }
  .card-date { font-size: 11px; color: var(--text-dim); letter-spacing: 0.5px; }
  .card-mood { font-size: 22px; }
  .card-preview { font-size: 13px; color: rgba(190,195,220,0.45); line-height: 1.5; font-weight: 300; }

  /* Tags */
  .tag-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .tag-pill {
    font-size: 10px; color: var(--blue-text);
    background: var(--blue-soft); border: 1px solid rgba(100,160,255,0.15);
    border-radius: 20px; padding: 2px 10px; letter-spacing: 0.5px;
  }

  /* Write form */
  .write-view { animation: fadeUp 0.35s ease-out; }
  .title-input {
    width: 100%; background: none; border: none;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    font-family: var(--font-display); font-size: 24px; font-weight: 300;
    color: var(--text-bright); padding: 8px 0 14px; margin-bottom: 16px;
  }
  .title-input::placeholder { color: rgba(180,190,220,0.35); }
  .body-input {
    width: 100%; background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.06); border-radius: 14px;
    font-family: var(--font-body); font-size: 15px; font-weight: 300;
    color: rgba(210,215,240,0.8); padding: 16px; line-height: 1.7;
    resize: none; min-height: 180px;
  }
  .body-input::placeholder { color: rgba(180,190,220,0.35); }
  .body-input:focus, .title-input:focus { outline: none; }

  .section-label {
    font-size: 11px; color: var(--text-dim); letter-spacing: 1.5px;
    text-transform: uppercase; margin-bottom: 10px; margin-top: 20px;
  }

  .mood-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .mood-btn {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 10px 14px; border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px; cursor: pointer; background: rgba(255,255,255,0.04);
    min-width: 60px; transition: all 0.2s;
  }
  .mood-btn.active { background: var(--accent); border-color: var(--accent-border); }
  .mood-btn .emoji { font-size: 20px; }
  .mood-btn .label { font-size: 11px; color: rgba(200,210,240,0.7); font-family: var(--font-body); }

  .tag-row-write { display: flex; gap: 8px; flex-wrap: wrap; }
  .tag-btn {
    padding: 6px 14px; border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px; font-family: var(--font-body); font-size: 13px;
    cursor: pointer; background: rgba(255,255,255,0.04);
    color: rgba(200,210,230,0.5); transition: all 0.2s;
  }
  .tag-btn.active {
    background: rgba(100,180,255,0.15); border-color: rgba(120,180,255,0.4);
    color: rgba(160,210,255,0.9);
  }

  .save-btn {
    width: 100%; margin-top: 28px; padding: 16px;
    background: linear-gradient(135deg, rgba(100,80,255,0.3), rgba(160,100,255,0.2));
    border: 1px solid rgba(140,120,255,0.3); border-radius: 14px;
    color: rgba(220,215,255,0.9); font-family: var(--font-body);
    font-size: 15px; font-weight: 600; letter-spacing: 0.5px; cursor: pointer;
    transition: opacity 0.25s;
  }
  .save-btn:disabled { opacity: 0.35; cursor: default; }

  /* Detail */
  .detail-view { animation: fadeUp 0.35s ease-out; }
  .detail-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .detail-mood { font-size: 28px; }
  .detail-date { font-size: 12px; color: rgba(180,190,220,0.5); letter-spacing: 1.5px; text-transform: uppercase; }
  .detail-title { font-family: var(--font-display); font-size: 30px; font-weight: 300; color: rgba(235,230,255,0.9); line-height: 1.3; margin: 8px 0 16px; }
  .detail-body { font-size: 15px; font-weight: 300; color: var(--text-mid); line-height: 1.8; }
  .detail-body p { margin-bottom: 14px; }

  .delete-btn {
    margin-top: 40px; background: none;
    border: 1px solid rgba(255,100,100,0.15); border-radius: 12px;
    padding: 12px 20px; color: rgba(255,120,120,0.5);
    font-family: var(--font-body); font-size: 13px;
    cursor: pointer; width: 100%;
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="stars"></div>

<div id="app">
  <header>
    <button class="back-btn hidden" id="backBtn" onclick="goList()">← Back</button>
    <div class="header-spacer" id="headerSpacer"></div>
    <h1 class="logo">☽ Dreamscape</h1>
    <div class="header-spacer"></div>
  </header>

  <div class="scroll-area">
    <!-- LIST VIEW -->
    <div id="listView">
      <button class="new-btn" onclick="goWrite()"><span>✦</span> Record a Dream</button>
      <div id="dreamList" class="cards"></div>
      <div id="emptyState" class="empty hidden">
        <div class="empty-icon">🌙</div>
        <p class="empty-title">Your dream journal is empty</p>
        <p class="empty-sub">Tap above to capture your first dream</p>
      </div>
    </div>

    <!-- WRITE VIEW -->
    <div id="writeView" class="write-view hidden">
      <input type="text" class="title-input" id="dreamTitle" placeholder="Dream title (optional)">
      <textarea class="body-input" id="dreamBody" placeholder="What did you dream about?&#10;&#10;Write freely — every detail helps you remember..." rows="7"></textarea>

      <p class="section-label">How did it feel?</p>
      <div class="mood-row" id="moodRow"></div>

      <p class="section-label">Tags</p>
      <div class="tag-row-write" id="tagRow"></div>

      <button class="save-btn" id="saveBtn" disabled onclick="saveDream()">Save Dream ✦</button>
    </div>

    <!-- DETAIL VIEW -->
    <div id="detailView" class="detail-view hidden"></div>
  </div>
</div>

<script>
const MOODS = [
  { emoji: "😴", label: "Peaceful" },
  { emoji: "✨", label: "Vivid" },
  { emoji: "😨", label: "Nightmare" },
  { emoji: "🤔", label: "Strange" },
  { emoji: "😊", label: "Happy" },
  { emoji: "🌀", label: "Lucid" },
];
const TAGS = ["Recurring", "Flying", "Falling", "Chase", "Water", "People", "Animals", "Place"];

let dreams = [];
let selectedMood = null;
let selectedTags = [];
let currentView = "list";

// Storage
function loadDreams() {
  try { dreams = JSON.parse(localStorage.getItem("dreamscape_dreams") || "[]"); } catch { dreams = []; }
}
function persistDreams() {
  localStorage.setItem("dreamscape_dreams", JSON.stringify(dreams));
}

// Stars
function createStars() {
  const el = document.getElementById("stars");
  for (let i = 0; i < 40; i++) {
    const s = document.createElement("div");
    s.className = "star";
    const size = Math.random() * 2 + 0.5;
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;width:${size}px;height:${size}px;--dur:${Math.random()*3+2}s;--delay:${Math.random()*4}s;`;
    el.appendChild(s);
  }
}

// Format
function fmtDate(iso) {
  return new Date(iso).toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
}
function fmtTime(iso) {
  return new Date(iso).toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
}

// Navigation
function showView(name) {
  currentView = name;
  document.getElementById("listView").classList.toggle("hidden", name !== "list");
  document.getElementById("writeView").classList.toggle("hidden", name !== "write");
  document.getElementById("detailView").classList.toggle("hidden", name !== "detail");
  document.getElementById("backBtn").classList.toggle("hidden", name === "list");
  document.getElementById("headerSpacer").classList.toggle("hidden", name !== "list");
}
function goList() { showView("list"); renderList(); resetForm(); }
function goWrite() { showView("write"); resetForm(); document.getElementById("dreamBody").focus(); }

// Render list
function renderList() {
  const list = document.getElementById("dreamList");
  const empty = document.getElementById("emptyState");
  if (dreams.length === 0) {
    list.innerHTML = "";
    empty.classList.remove("hidden");
    return;
  }
  empty.classList.add("hidden");
  list.innerHTML = dreams.map((d, i) => `
    <button class="card" style="animation-delay:${i*0.05}s" onclick="openDream('${d.id}')">
      <div class="card-top">
        <div>
          <div class="card-title">${esc(d.title)}</div>
          <div class="card-date">${fmtDate(d.date)} · ${fmtTime(d.date)}</div>
        </div>
        ${d.mood !== null ? `<span class="card-mood">${MOODS[d.mood]?.emoji || ""}</span>` : ""}
      </div>
      <div class="card-preview">${esc(d.body.slice(0,100))}${d.body.length > 100 ? "…" : ""}</div>
      ${d.tags?.length ? `<div class="tag-row">${d.tags.map(t => `<span class="tag-pill">${esc(t)}</span>`).join("")}</div>` : ""}
    </button>
  `).join("");
}

// Open detail
function openDream(id) {
  const d = dreams.find(x => x.id === id);
  if (!d) return;
  const el = document.getElementById("detailView");
  const bodyHtml = esc(d.body).replace(/\n/g, "</p><p>");
  el.innerHTML = `
    <div class="detail-meta">
      ${d.mood !== null ? `<span class="detail-mood">${MOODS[d.mood]?.emoji || ""}</span>` : ""}
      <span class="detail-date">${fmtDate(d.date)} · ${fmtTime(d.date)}</span>
    </div>
    <h2 class="detail-title">${esc(d.title)}</h2>
    ${d.tags?.length ? `<div class="tag-row" style="margin-bottom:24px">${d.tags.map(t => `<span class="tag-pill">${esc(t)}</span>`).join("")}</div>` : ""}
    <div class="detail-body"><p>${bodyHtml}</p></div>
    <button class="delete-btn" onclick="deleteDream('${d.id}')">Delete Dream</button>
  `;
  showView("detail");
}

function deleteDream(id) {
  if (!confirm("Delete this dream?")) return;
  dreams = dreams.filter(x => x.id !== id);
  persistDreams();
  goList();
}

// Write form
function buildMoods() {
  document.getElementById("moodRow").innerHTML = MOODS.map((m, i) => `
    <button class="mood-btn" data-idx="${i}" onclick="pickMood(${i})">
      <span class="emoji">${m.emoji}</span>
      <span class="label">${m.label}</span>
    </button>
  `).join("");
}
function buildTags() {
  document.getElementById("tagRow").innerHTML = TAGS.map(t => `
    <button class="tag-btn" data-tag="${t}" onclick="pickTag('${t}')">${t}</button>
  `).join("");
}

function pickMood(i) {
  selectedMood = selectedMood === i ? null : i;
  document.querySelectorAll(".mood-btn").forEach(b => b.classList.toggle("active", +b.dataset.idx === selectedMood));
}
function pickTag(t) {
  if (selectedTags.includes(t)) selectedTags = selectedTags.filter(x => x !== t);
  else selectedTags.push(t);
  document.querySelectorAll(".tag-btn").forEach(b => b.classList.toggle("active", selectedTags.includes(b.dataset.tag)));
}

function resetForm() {
  document.getElementById("dreamTitle").value = "";
  document.getElementById("dreamBody").value = "";
  selectedMood = null;
  selectedTags = [];
  document.querySelectorAll(".mood-btn").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(".tag-btn").forEach(b => b.classList.remove("active"));
  updateSaveBtn();
}

function updateSaveBtn() {
  document.getElementById("saveBtn").disabled = !document.getElementById("dreamBody").value.trim();
}

function saveDream() {
  const body = document.getElementById("dreamBody").value.trim();
  if (!body) return;
  const title = document.getElementById("dreamTitle").value.trim() || "Untitled Dream";
  dreams.unshift({
    id: Date.now().toString(),
    title, body,
    mood: selectedMood,
    tags: [...selectedTags],
    date: new Date().toISOString(),
  });
  persistDreams();
  goList();
}

function esc(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

// Init
createStars();
loadDreams();
buildMoods();
buildTags();
renderList();
document.getElementById("dreamBody").addEventListener("input", updateSaveBtn);
</script>
</body>
</html>
